name: Pipeline Painel LDO

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    env:
      R_LIBS_USER: ~/R
      GH_TOKEN: ${{ secrets.GH_TOKEN }}

    steps:
      - name: Checkout do repositório
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      - name: Node (Observable)
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar R
        uses: r-lib/actions/setup-r@v2

      - name: Definir R_HOME
        run: echo "R_HOME=$(R RHOME)" >> $GITHUB_ENV

      - name: Cache R libs
      - uses: actions/cache@v4
        with:
          path: ~/R
          key: r-libs-${{ runner.os }}

      - name: Instalar dependências R
        run: |
          mkdir -p ~/R
          Rscript -e ".libPaths('~/R'); install.packages('remotes', repos='https://cloud.r-project.org')"
          Rscript -e ".libPaths('~/R'); remotes::install_github('splor-mg/relatorios', auth_token = Sys.getenv('GH_TOKEN'))"

      - name: Instalar Python
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Instalar Poetry
      - run: pip install poetry

      - name: Cache Poetry
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}

      - name: Instalar dependências Python
      - run: poetry install

      - name: Rodar pipeline de dados
        run: |
          poetry run task toml
          poetry run task extract
          poetry run task transform
        env:
          R_LIBS_USER: ~/R
          LD_LIBRARY_PATH: ${{ env.R_HOME }}/lib:${{ env.LD_LIBRARY_PATH }}

      - name: Commit dados
        run: |
          git add src/data/

          if ! git diff --cached --quiet; then
            git commit -m "Atualiza dados [skip ci]"
            git push origin main
          else
            echo "Sem alterações"
          fi

      - name: Build do site
      - run: npm ci
      - run: npm run build

      - name: GitHub Pages
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
